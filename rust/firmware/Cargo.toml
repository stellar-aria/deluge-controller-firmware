[package]
name = "deluge-firmware"
version = "0.1.0"
edition = "2021"

[dependencies]
rza1 = { path = "../rza1" }
deluge-bsp = { path = "../deluge-bsp" }
rtt-target = "0.6"
cortex-ar = "0.3"
embassy-executor = { version = "0.10", features = ["nightly", "platform-cortex-ar", "executor-thread"] }
embassy-time = { version = "0.5", features = ["tick-hz-1_000_000"] }
